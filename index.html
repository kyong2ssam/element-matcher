<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학급 맞춤형 원소 매칭기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; }
        .element-grid-item { transition: all 0.2s ease; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        
        #captureArea {
            background-color: #f8fafc;
            padding: 1.5rem;
            border-radius: 1.5rem;
        }

        /* 모바일 5열 대응을 위한 미세 조정 */
        @media (max-width: 640px) {
            .student-label { font-size: 0.65rem !important; padding: 0.1rem 0.25rem !important; }
            .symbol-text { font-size: 1.25rem !important; }
            .name-text { font-size: 0.75rem !important; }
            #captureArea { padding: 1rem; }
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            #resultGrid {
                display: grid !important;
                grid-template-columns: repeat(5, 1fr) !important;
                gap: 8px !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 flex flex-col">

    <div class="flex-grow max-w-6xl mx-auto px-4 py-8 w-full">
        <header class="text-center mb-8 no-print">
            <h1 class="text-3xl md:text-4xl font-extrabold text-indigo-600 mb-2">🏫 학급 원소 매칭기</h1>
            <p class="text-slate-500 font-medium text-sm md:text-base">조건을 입력하고 학급 전체 결과를 생성하세요.</p>
        </header>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-8 no-print">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">학년 / 반</label>
                    <div class="flex gap-2">
                        <input type="number" id="grade" placeholder="학년" class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                        <input type="number" id="classGroup" placeholder="반" class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">시작 번호</label>
                    <input type="number" id="startNum" value="1" class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">끝 번호</label>
                    <input type="number" id="endNum" value="24" class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">제외 번호</label>
                    <input type="text" id="excludeNums" placeholder="예: 5, 12" class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                </div>
            </div>
            
            <div class="mt-6 flex flex-col sm:flex-row gap-3">
                <button onclick="generateClassMatch()" class="flex-grow bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-all shadow-md active:scale-[0.98]">
                    ✨ 매칭하기
                </button>
                <button id="saveImageBtn" onclick="saveAsImage()" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md active:scale-[0.98]">
                    💾 이미지 저장
                </button>
            </div>
        </div>

        <div id="classResultArea" class="hidden animate-slide-up">
            <div id="captureArea">
                <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-200">
                    <h2 id="resultTitle" class="text-lg md:text-2xl font-black text-slate-800">
                        원소 매칭 결과
                    </h2>
                    <p id="totalCountInfo" class="text-slate-400 font-bold text-xs md:text-sm"></p>
                </div>

                <div id="resultGrid" class="grid grid-cols-5 gap-2 md:gap-4 mb-8">
                    </div>

                <div class="pt-4 border-t border-slate-200 text-center">
                    <p class="text-[10px] md:text-xs text-slate-400 font-medium tracking-tight">created by. 쿙쌤</p>
                </div>
            </div>
        </div>

        <div id="emptyMessage" class="hidden text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200">
            <p class="text-slate-400">조건에 맞는 학생이 없습니다.</p>
        </div>
    </div>

    <footer id="mainFooter" class="py-8 text-center no-print border-t border-slate-100 mt-auto">
        <p class="text-[11px] md:text-xs text-slate-400 font-medium tracking-tight">created by. 쿙쌤</p>
    </footer>

    <script>
        const baseElements = [
            { name: "수소", symbol: "H" }, { name: "리튬", symbol: "Li" }, { name: "나트륨", symbol: "Na" },
            { name: "마그네슘", symbol: "Mg" }, { name: "칼륨", symbol: "K" }, { name: "칼슘", symbol: "Ca" },
            { name: "철", symbol: "Fe" }, { name: "헬륨", symbol: "He" }, { name: "탄소", symbol: "C" },
            { name: "질소", symbol: "N" }, { name: "산소", symbol: "O" }, { name: "플루오린", symbol: "F" },
            { name: "네온", symbol: "Ne" }, { name: "알루미늄", symbol: "Al" }, { name: "규소", symbol: "Si" },
            { name: "염소", symbol: "Cl" }, { name: "니켈", symbol: "Ni" }, { name: "구리", symbol: "Cu" },
            { name: "아연", symbol: "Zn" }, { name: "은", symbol: "Ag" }, { name: "아이오딘", symbol: "I" },
            { name: "금", symbol: "Au" }, { name: "수은", symbol: "Hg" }, { name: "납", symbol: "Pb" }
        ];

        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function generateClassMatch() {
            const grade = document.getElementById('grade').value;
            const classGroup = document.getElementById('classGroup').value;
            const startNum = parseInt(document.getElementById('startNum').value);
            const endNum = parseInt(document.getElementById('endNum').value);
            const excludeInput = document.getElementById('excludeNums').value;
            
            const resultGrid = document.getElementById('resultGrid');
            const classResultArea = document.getElementById('classResultArea');
            const mainFooter = document.getElementById('mainFooter');
            const emptyMessage = document.getElementById('emptyMessage');
            const saveImageBtn = document.getElementById('saveImageBtn');
            const resultTitle = document.getElementById('resultTitle');

            if (grade && classGroup) {
                resultTitle.innerText = `${grade}학년 ${classGroup}반 원소 매칭`;
            } else {
                resultTitle.innerText = `원소 매칭 결과`;
            }

            const excluded = excludeInput.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));

            if (isNaN(startNum) || isNaN(endNum) || startNum > endNum) {
                alert("번호 범위를 확인해 주세요.");
                return;
            }

            const students = [];
            for (let i = startNum; i <= endNum; i++) {
                if (!excluded.includes(i)) students.push(i);
            }

            if (students.length === 0) {
                resultGrid.innerHTML = '';
                classResultArea.classList.add('hidden');
                emptyMessage.classList.remove('hidden');
                mainFooter.classList.remove('hidden');
                return;
            }

            emptyMessage.classList.add('hidden');
            classResultArea.classList.remove('hidden');
            mainFooter.classList.add('hidden'); 
            saveImageBtn.classList.remove('hidden');
            resultGrid.innerHTML = '';
            document.getElementById('totalCountInfo').innerText = `${students.length}명 배정`;

            let elementPool = shuffleArray(baseElements);
            
            students.forEach((studentNum, idx) => {
                if (idx > 0 && idx % baseElements.length === 0) elementPool = shuffleArray(baseElements);
                const element = elementPool[idx % baseElements.length];

                const card = document.createElement('div');
                card.className = 'bg-white p-2 md:p-4 rounded-xl md:rounded-2xl border border-slate-100 shadow-sm text-center flex flex-col items-center justify-center';
                card.innerHTML = `
                    <span class="student-label text-[10px] md:text-xs font-bold text-slate-400 mb-1 md:mb-2 bg-slate-50 px-1 md:px-2 py-0.5 rounded-full border border-slate-100">${studentNum}번</span>
                    <span class="symbol-text text-xl md:text-3xl font-black text-indigo-600 leading-tight">${element.symbol}</span>
                    <span class="name-text text-[10px] md:text-sm font-semibold text-slate-700">${element.name}</span>
                `;
                resultGrid.appendChild(card);
            });
            
            classResultArea.scrollIntoView({ behavior: 'smooth' });
        }

        function saveAsImage() {
            const captureArea = document.getElementById('captureArea');
            const saveBtn = document.getElementById('saveImageBtn');
            const grade = document.getElementById('grade').value;
            const classGroup = document.getElementById('classGroup').value;
            
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = "⏳ 생성중";
            saveBtn.disabled = true;

            html2canvas(captureArea, {
                scale: 3, 
                backgroundColor: "#f8fafc",
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = (grade && classGroup) ? `${grade}학년_${classGroup}반_원소매칭.png` : '원소매칭.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
            }).catch(() => {
                alert("저장 실패");
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
            });
        }
    </script>
</body>
</html>
